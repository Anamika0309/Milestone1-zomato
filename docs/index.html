<!DOCTYPE html>
<html>
<head>
    <title>Crave AI Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">
    <h1 class="text-3xl font-bold mb-8">Crave AI - Test Version</h1>
    
    <div class="max-w-2xl mx-auto">
        <h2 class="text-xl font-semibold mb-4">Test Form</h2>
        
        <form id="testForm" class="space-y-4 mb-8">
            <div>
                <label class="block text-sm font-medium mb-1">Location</label>
                <select id="location" class="w-full p-2 border rounded">
                    <option value="">Select location</option>
                    <option value="Brookefield">Brookefield</option>
                    <option value="Indiranagar">Indiranagar</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-medium mb-1">Budget</label>
                <select id="budget" class="w-full p-2 border rounded">
                    <option value="">Select budget</option>
                    <option value="low">Under ₹500</option>
                    <option value="medium">₹500-₹1000</option>
                </select>
            </div>
            
            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">
                Get Recommendations
            </button>
        </form>
        
        <div id="results" class="hidden">
            <h3 class="text-xl font-semibold mb-4">Results:</h3>
            <div id="restaurantCards" class="grid gap-4">
                <!-- Results will appear here -->
            </div>
        </div>
        
        <div id="debug" class="mt-8 p-4 bg-gray-100 rounded">
            <h3 class="font-semibold mb-2">Debug Info:</h3>
            <div id="debugInfo">Waiting for form submission...</div>
        </div>
    </div>

    <script>
        // Debug function
        function updateDebug(message) {
            document.getElementById('debugInfo').innerHTML += '<br>' + message;
            console.log(message);
        }
        
        updateDebug('JavaScript loaded successfully');
        
        // Form handler
        document.getElementById('testForm').addEventListener('submit', function(e) {
            e.preventDefault();
            updateDebug('Form submitted!');
            
            const location = document.getElementById('location').value;
            const budget = document.getElementById('budget').value;
            
            updateDebug('Location: ' + location);
            updateDebug('Budget: ' + budget);
            
            // Show results immediately
            const resultsDiv = document.getElementById('results');
            const cardsDiv = document.getElementById('restaurantCards');
            
            // Create sample restaurant cards
            const restaurants = [
                { name: 'Test Restaurant 1', cuisine: 'Indian', rating: 4.5, price: '₹800' },
                { name: 'Test Restaurant 2', cuisine: 'Chinese', rating: 4.3, price: '₹600' }
            ];
            
            cardsDiv.innerHTML = restaurants.map(r => `
                <div class="bg-white p-4 border rounded shadow">
                    <h4 class="font-bold">${r.name}</h4>
                    <p>Cuisine: ${r.cuisine}</p>
                    <p>Rating: ${r.rating} ⭐</p>
                    <p>Price: ${r.price}</p>
                </div>
            `).join('');
            
            resultsDiv.classList.remove('hidden');
            updateDebug('Results displayed!');
        });
    </script>
</body>
</html>
