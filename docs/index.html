<!DOCTYPE html>
<html>
<head>
    <title>Crave AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-4xl font-bold text-center mb-8">🍽️ Crave AI</h1>
        <p class="text-center text-gray-600 mb-12">Find your perfect restaurant</p>
        
        <form id="form" class="bg-white p-8 rounded-lg shadow-lg mb-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium mb-2">Location</label>
                    <select id="location" class="w-full p-3 border rounded-lg">
                        <option value="">Select location</option>
                        <option value="Brookefield">Brookefield</option>
                        <option value="Koramangala 3Rd Block">Koramangala 3rd Block</option>
                        <option value="Indiranagar">Indiranagar</option>
                        <option value="Whitefield">Whitefield</option>
                        <option value="HSR Layout">HSR Layout</option>
                        <option value="Jayanagar">Jayanagar</option>
                        <option value="BTM Layout">BTM Layout</option>
                        <option value="Marathahalli">Marathahalli</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">Budget</label>
                    <select id="budget" class="w-full p-3 border rounded-lg">
                        <option value="">Select budget</option>
                        <option value="low">Under ₹500</option>
                        <option value="medium">₹500-₹1000</option>
                        <option value="high">₹1000-₹2000</option>
                        <option value="premium">Above ₹2000</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">Rating</label>
                    <select id="rating" class="w-full p-3 border rounded-lg">
                        <option value="">Select rating</option>
                        <option value="3">3+ Stars</option>
                        <option value="4">4+ Stars</option>
                        <option value="4.5">4.5+ Stars</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">Cuisine</label>
                    <select id="cuisine" class="w-full p-3 border rounded-lg">
                        <option value="">Select cuisine</option>
                        <option value="indian">Indian</option>
                        <option value="chinese">Chinese</option>
                        <option value="italian">Italian</option>
                        <option value="mexican">Mexican</option>
                    </select>
                </div>
            </div>
            
            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 mt-6">
                Get Recommendations
            </button>
        </form>
        
        <div id="results" class="hidden">
            <h2 class="text-2xl font-bold mb-6">Recommended Restaurants</h2>
            <div id="restaurants" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Results will appear here -->
            </div>
        </div>
    </div>

    <script>
        document.getElementById('form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const location = document.getElementById('location').value;
            const budget = document.getElementById('budget').value;
            const rating = document.getElementById('rating').value;
            const cuisine = document.getElementById('cuisine').value;
            
            // Simple restaurant data
            const restaurants = [
                {
                    name: "Paradise Biryani",
                    cuisine: "Indian",
                    rating: 4.5,
                    price: "₹600",
                    image: "https://images.unsplash.com/photo-1517248135467-4c8ed12e86b9?w=400"
                },
                {
                    name: "Dragon Palace",
                    cuisine: "Chinese",
                    rating: 4.3,
                    price: "₹500",
                    image: "https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=400"
                },
                {
                    name: "Bella Italia",
                    cuisine: "Italian",
                    rating: 4.6,
                    price: "₹800",
                    image: "https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=400"
                }
            ];
            
            // Display results
            const resultsDiv = document.getElementById('results');
            const restaurantsDiv = document.getElementById('restaurants');
            
            restaurantsDiv.innerHTML = restaurants.map(r => `
                <div class="bg-white p-6 rounded-lg shadow-lg">
                    <img src="${r.image}" class="w-full h-48 object-cover rounded mb-4">
                    <h3 class="font-bold text-lg mb-2">${r.name}</h3>
                    <p class="text-gray-600 mb-1">Cuisine: ${r.cuisine}</p>
                    <p class="text-gray-600 mb-1">Rating: ${r.rating} ⭐</p>
                    <p class="text-gray-600">Price: ${r.price}</p>
                </div>
            `).join('');
            
            resultsDiv.classList.remove('hidden');
            resultsDiv.scrollIntoView({ behavior: 'smooth' });
        });
    </script>
</body>
</html>
